<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<body>
    <footer th:fragment="footer" class="site-footer"
        style="padding: 60px 0; border-top: 1px solid var(--border-color); margin-top: 80px; text-align: center; color: var(--text-light); font-size: 0.85rem; position: relative;">

        
        <div id="comparison-tray"
            style="position: fixed; bottom: 0; left: 0; width: 100%; background: var(--primary-color); color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 -4px 10px rgba(0,0,0,0.1); transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1000; text-align: left;">
            <div style="flex: 1; display: flex; align-items: center; gap: 20px;">
                <span id="compare-count" style="font-weight: 500; font-size: 0.95rem;">0 items selected for
                    comparison</span>
                <button id="compare-clear-btn"
                    style="background: transparent; color: rgba(255,255,255,0.7); border: 1px solid rgba(255,255,255,0.3); padding: 5px 15px; border-radius: 4px; font-size: 0.8rem; cursor: pointer; transition: 0.2s;">Clear
                    All</button>
            </div>
            <div>
                <button id="compare-submit-btn"
                    style="background: white; color: var(--primary-color); border: none; padding: 8px 25px; border-radius: 4px; font-weight: 600; font-size: 0.9rem; cursor: pointer; transition: 0.2s;">Compare
                    Selected</button>
            </div>
        </div>

        <div class="container">
            <p>&copy; 2026 QC Fashion Store. All rights reserved.</p>
        </div>

        
        <div th:replace="~{fragments/chatbot :: chatbot}"></div>

        
        <script th:src="@{/compare.js}"></script>
        <script th:src="@{/js/main.js}"></script>
    </footer>
</body>

</html>

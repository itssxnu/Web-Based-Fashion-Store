<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Platform Users | Admin Dashboard</title>
    <link rel="stylesheet" th:href="@{/admin/layout.html}" />
    <style th:replace="~{admin/layout :: style}"></style>
</head>

<body
    style="margin: 0; font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #0f172a; display: flex; min-height: 100vh;">

    <aside th:replace="~{admin/layout :: sidebar(activePage='users')}"></aside>

    <main class="main-content"
        style="flex: 1; padding: 2rem 3rem; display: flex; flex-direction: column; overflow-y: auto;">

        <div class="header-top"
            style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid #e2e8f0;">
            <h1 style="font-size: 1.8rem; font-weight: 500; margin: 0; color: #0f172a;">Manage Users</h1>
            <div style="color: #64748b; font-size: 0.9rem;">View and manage registered accounts</div>
        </div>

        <div th:if="${param.success}" class="alert alert-success"
            style="padding: 1rem; margin-bottom: 1.5rem; border-radius: 0.375rem; background: rgba(16, 185, 129, 0.1); color: #10b981; border: 1px solid #10b981;"
            th:text="${param.success}"></div>
        <div th:if="${param.error}" class="alert alert-danger"
            style="padding: 1rem; margin-bottom: 1.5rem; border-radius: 0.375rem; background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid #ef4444;"
            th:text="${param.error}"></div>

        <div style="background-color: #ffffff; border-radius: 0.5rem; border: 1px solid #e2e8f0; overflow: hidden;">
            <table style="width: 100%; border-collapse: collapse;">
                <thead>
                    <tr>
                        <th
                            style="padding: 1rem; text-align: left; border-bottom: 1px solid #e2e8f0; font-weight: 600; color: #64748b; font-size: 0.75rem; text-transform: uppercase;">
                            ID</th>
                        <th
                            style="padding: 1rem; text-align: left; border-bottom: 1px solid #e2e8f0; font-weight: 600; color: #64748b; font-size: 0.75rem; text-transform: uppercase;">
                            Name</th>
                        <th
                            style="padding: 1rem; text-align: left; border-bottom: 1px solid #e2e8f0; font-weight: 600; color: #64748b; font-size: 0.75rem; text-transform: uppercase;">
                            Email</th>
                        <th
                            style="padding: 1rem; text-align: left; border-bottom: 1px solid #e2e8f0; font-weight: 600; color: #64748b; font-size: 0.75rem; text-transform: uppercase;">
                            Phone</th>
                        <th
                            style="padding: 1rem; text-align: left; border-bottom: 1px solid #e2e8f0; font-weight: 600; color: #64748b; font-size: 0.75rem; text-transform: uppercase;">
                            Role</th>
                        <th
                            style="padding: 1rem; text-align: left; border-bottom: 1px solid #e2e8f0; font-weight: 600; color: #64748b; font-size: 0.75rem; text-transform: uppercase;">
                            Status</th>
                        <th
                            style="padding: 1rem; text-align: center; border-bottom: 1px solid #e2e8f0; font-weight: 600; color: #64748b; font-size: 0.75rem; text-transform: uppercase;">
                            Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="user : ${users}">
                        <td style="padding: 1rem; border-bottom: 1px solid #e2e8f0; color: #0f172a; font-size: 0.85rem;"
                            th:text="${user.id}">1</td>
                        <td style="padding: 1rem; border-bottom: 1px solid #e2e8f0; color: #0f172a; font-weight: 500; font-size: 0.85rem;"
                            th:text="${user.name}">John Doe</td>
                        <td style="padding: 1rem; border-bottom: 1px solid #e2e8f0; color: #64748b; font-size: 0.85rem;"
                            th:text="${user.email}">john@example.com</td>
                        <td style="padding: 1rem; border-bottom: 1px solid #e2e8f0; color: #64748b; font-size: 0.85rem;"
                            th:text="${user.phone}">+94770000000</td>
                        <td style="padding: 1rem; border-bottom: 1px solid #e2e8f0; font-size: 0.85rem;">
                            <span th:text="${user.role.name()}"
                                th:style="${user.role.name() == 'SELLER' ? 'background: rgba(59, 130, 246, 0.1); color: #3b82f6; padding: 0.25rem 0.5rem; border-radius: 4px; font-weight: 600;' : 'background: rgba(148, 163, 184, 0.1); color: #64748b; padding: 0.25rem 0.5rem; border-radius: 4px; font-weight: 600;'}">ROLE</span>
                        </td>
                        <td style="padding: 1rem; border-bottom: 1px solid #e2e8f0;">
                            <span th:if="${user.enabled}"
                                style="background: rgba(16, 185, 129, 0.1); color: #10b981; padding: 0.25rem 0.5rem; border-radius: 4px; font-size: 0.75rem; font-weight: 600;">Verified</span>
                            <span th:unless="${user.enabled}"
                                style="background: rgba(245, 158, 11, 0.1); color: #f59e0b; padding: 0.25rem 0.5rem; border-radius: 4px; font-size: 0.75rem; font-weight: 600;">Pending
                                OTP</span>
                        </td>
                        <td style="padding: 1rem; border-bottom: 1px solid #e2e8f0; text-align: center;">
                            <a th:href="@{/admin/users/{id}/delete(id=${user.id})}"
                                onclick="return confirm('WARNING: Are you sure you want to delete this user? This action cannot be undone and will fail if they have active orders/products.');"
                                style="color: #ef4444; text-decoration: none; font-size: 0.85rem; font-weight: 500; display: inline-flex; align-items: center; gap: 4px;">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round">
                                    <path d="M3 6h18"></path>
                                    <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path>
                                    <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path>
                                </svg>
                                Delete
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(users)}">
                        <td colspan="7" style="padding: 2rem; text-align: center; color: #64748b; font-size: 0.85rem;">
                            No registered users found.</td>
                    </tr>
                </tbody>
            </table>
        </div>

    </main>
</body>

</html>

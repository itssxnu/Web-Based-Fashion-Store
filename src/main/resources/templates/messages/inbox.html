<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head(title='Inbox')}"></head>

<body>
    <div th:replace="~{fragments/header :: header}"></div>

    <main style="max-width: 1200px; margin: 2rem auto; padding: 0 1rem; display: flex; gap: 2rem; min-height: 600px;">

        
        <aside
            style="width: 300px; background: white; border: 1px solid var(--border-color); border-radius: 0.5rem; overflow: hidden; display: flex; flex-direction: column;">
            <div style="padding: 1.5rem; border-bottom: 1px solid var(--border-color); background: #f8fafc;">
                <h2 style="margin: 0; font-size: 1.25rem; font-weight: 500; color: var(--primary-color);">Messages</h2>
            </div>

            <div style="flex: 1; overflow-y: auto;">
                <a th:each="user : ${conversations}" th:href="@{/messages/{id}(id=${user.id})}"
                    style="display: flex; align-items: center; gap: 1rem; padding: 1rem 1.5rem; border-bottom: 1px solid #f1f5f9; text-decoration: none; transition: background 0.2s; color: inherit;"
                    onmouseover="this.style.backgroundColor='#f8fafc'"
                    onmouseout="this.style.backgroundColor='transparent'">

                    <div
                        style="width: 40px; height: 40px; border-radius: 50%; background: var(--primary-color); color: white; display: flex; align-items: center; justify-content: center; font-weight: 600;">
                        <span th:text="${#strings.substring(user.name, 0, 1).toUpperCase()}">U</span>
                    </div>
                    <div>
                        <div style="font-weight: 500; color: var(--text-color);" th:text="${user.name}">User Name</div>
                        <div style="font-size: 0.8rem; color: #10b981; margin-top: 0.2rem;"
                            th:if="${user.role.name() == 'SELLER'}">Seller</div>
                    </div>
                </a>

                <div th:if="${#lists.isEmpty(conversations)}"
                    style="padding: 2rem; text-align: center; color: var(--text-light); font-size: 0.9rem;">
                    No recent conversations.
                </div>
            </div>
        </aside>

        
        <section
            style="flex: 1; background: white; border: 1px solid var(--border-color); border-radius: 0.5rem; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-light);">
            <svg style="width: 64px; height: 64px; margin-bottom: 1rem; color: #cbd5e1;" fill="none"
                stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                    d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z">
                </path>
            </svg>
            <h3 style="font-size: 1.25rem; font-weight: 500; color: var(--text-color); margin: 0 0 0.5rem 0;">Your Inbox
            </h3>
            <p style="margin: 0; font-size: 0.9rem;">Select a conversation to start messaging.</p>
        </section>

    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>
</body>

</html>

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head(title='Chat | ' + ${otherUser.name})}"></head>

<body>
    <div th:replace="~{fragments/header :: header}"></div>

    <main
        style="max-width: 1200px; margin: 2rem auto; padding: 0 1rem; display: flex; gap: 2rem; height: 75vh; min-height: 600px;">

        
        <aside
            style="width: 300px; background: white; border: 1px solid var(--border-color); border-radius: 0.5rem; overflow: hidden; display: flex; flex-direction: column;">
            <div style="padding: 1.5rem; border-bottom: 1px solid var(--border-color); background: #f8fafc;">
                <h2 style="margin: 0; font-size: 1.25rem; font-weight: 500; color: var(--primary-color);">Messages</h2>
            </div>

            <div style="flex: 1; overflow-y: auto;">
                
                <a th:href="@{/messages/{id}(id=${otherUser.id})}"
                    style="display: flex; align-items: center; gap: 1rem; padding: 1rem 1.5rem; border-left: 4px solid var(--primary-color); background: #f8fafc; text-decoration: none; color: inherit;">
                    <div
                        style="width: 40px; height: 40px; border-radius: 50%; background: var(--primary-color); color: white; display: flex; align-items: center; justify-content: center; font-weight: 600;">
                        <span th:text="${#strings.substring(otherUser.name, 0, 1).toUpperCase()}">U</span>
                    </div>
                    <div>
                        <div style="font-weight: 600; color: var(--text-color);" th:text="${otherUser.name}">User Name
                        </div>
                        <div style="font-size: 0.8rem; color: #10b981; margin-top: 0.2rem;"
                            th:if="${otherUser.role.name() == 'SELLER'}">Seller</div>
                    </div>
                </a>

                
                <th:block th:each="user : ${conversations}">
                    <a th:if="${user.id != otherUser.id}" th:href="@{/messages/{id}(id=${user.id})}"
                        style="display: flex; align-items: center; gap: 1rem; padding: 1rem 1.5rem; border-bottom: 1px solid #f1f5f9; border-left: 4px solid transparent; text-decoration: none; transition: background 0.2s; color: inherit;"
                        onmouseover="this.style.backgroundColor='#f8fafc'"
                        onmouseout="this.style.backgroundColor='transparent'">

                        <div
                            style="width: 40px; height: 40px; border-radius: 50%; background: #64748b; color: white; display: flex; align-items: center; justify-content: center; font-weight: 600;">
                            <span th:text="${#strings.substring(user.name, 0, 1).toUpperCase()}">U</span>
                        </div>
                        <div>
                            <div style="font-weight: 500; color: var(--text-color);" th:text="${user.name}">User Name
                            </div>
                        </div>
                    </a>
                </th:block>
            </div>
        </aside>

        
        <section
            style="flex: 1; background: white; border: 1px solid var(--border-color); border-radius: 0.5rem; display: flex; flex-direction: column; overflow: hidden;">

            
            <div
                style="padding: 1rem 1.5rem; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; gap: 1rem; background: #fff;">
                <div
                    style="width: 40px; height: 40px; border-radius: 50%; background: var(--primary-color); color: white; display: flex; align-items: center; justify-content: center; font-weight: 600;">
                    <span th:text="${#strings.substring(otherUser.name, 0, 1).toUpperCase()}">U</span>
                </div>
                <div>
                    <h3 style="margin: 0; font-size: 1.1rem; color: var(--text-color);" th:text="${otherUser.name}">
                        Recipient</h3>
                    <div style="font-size: 0.8rem; color: #10b981; margin-top: 0.1rem;"
                        th:if="${otherUser.role.name() == 'SELLER'}">Verified Seller</div>
                </div>
            </div>

            
            <div id="chat-stream"
                style="flex: 1; padding: 1.5rem; overflow-y: auto; display: flex; flex-direction: column; gap: 1rem; background: #f8fafc;">

                <div th:each="msg : ${chatHistory}" th:with="isSelf=${msg.sender.id == currentUser.id}"
                    th:style="${isSelf ? 'align-self: flex-end; max-width: 70%;' : 'align-self: flex-start; max-width: 70%;'}">

                    <div
                        th:style="${isSelf ? 'background: var(--primary-color); color: white; border-radius: 1rem 1rem 0 1rem; padding: 0.75rem 1rem;' : 'background: white; border: 1px solid #e2e8f0; color: var(--text-color); border-radius: 1rem 1rem 1rem 0; padding: 0.75rem 1rem;'}">
                        <div style="font-size: 0.95rem; line-height: 1.5; word-wrap: break-word;"
                            th:text="${msg.content}">Message text here</div>
                    </div>

                    <div th:style="${isSelf ? 'text-align: right; font-size: 0.7rem; color: #94a3b8; margin-top: 0.25rem;' : 'text-align: left; font-size: 0.7rem; color: #94a3b8; margin-top: 0.25rem;'}"
                        th:text="${#temporals.format(msg.timestamp, 'MMM dd, HH:mm')}">Time</div>
                </div>

                <div th:if="${#lists.isEmpty(chatHistory)}" style="text-align: center; color: #94a3b8; padding: 2rem;">
                    Say hello to <span th:text="${otherUser.name}">them</span>!
                </div>
            </div>

            
            <form th:action="@{/messages/{id}/send(id=${otherUser.id})}" method="post"
                style="padding: 1rem; background: white; border-top: 1px solid var(--border-color); display: flex; gap: 1rem;">
                <input type="text" name="content" required placeholder="Type your message here..." autocomplete="off"
                    style="flex: 1; padding: 0.8rem 1rem; border: 1px solid var(--border-color); border-radius: 2rem; font-size: 0.95rem; outline: none;">
                <button type="submit"
                    style="background: var(--primary-color); color: white; border: none; border-radius: 2rem; padding: 0 1.5rem; font-weight: 500; cursor: pointer; transition: 0.2s;">
                    Send
                </button>
            </form>

        </section>

    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>
    <script>
        // Scroll chat stream to bottom on load
        document.addEventListener("DOMContentLoaded", function () {
            var chatStream = document.getElementById("chat-stream");
            chatStream.scrollTop = chatStream.scrollHeight;
        });
    </script>
</body>

</html>

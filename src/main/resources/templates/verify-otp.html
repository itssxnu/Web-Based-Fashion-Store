<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head(title='Verify Mobile')}"></head>

<body>
    <div th:replace="~{fragments/header :: header}"></div>
    <main>
        <section class="login-section" style="padding: 100px 0; text-align: center;">
            <div class="container" style="max-width: 400px; margin: 0 auto;">
                <h1 style="font-weight: 300; margin-bottom: 20px;">Verify Your Mobile</h1>
                <p style="color: var(--text-light); margin-bottom: 30px; font-size: 0.95rem;">
                    We've sent a 6-digit code to your email.
                </p>

                <div th:if="${error}" style="color: red; margin-bottom: 20px; font-size: 0.9rem;" th:text="${error}">
                </div>

                <form th:action="@{/verify-otp}" th:object="${otpDto}" method="post"
                    style="display: flex; flex-direction: column; gap: 20px;">
                    <input type="hidden" th:field="*{email}" />

                    <div>
                        <input type="text" th:field="*{code}" placeholder="Enter 6-digit OTP" required maxlength="6"
                            pattern="\d{6}"
                            style="padding: 15px; border: 1px solid var(--border-color); width: 100%; text-align: center; letter-spacing: 5px; font-size: 1.2rem; box-sizing: border-box;">
                        <span th:if="${#fields.hasErrors('code')}" th:errors="*{code}"
                            style="color: red; font-size: 0.8rem; display: block; margin-top: 5px;"></span>
                    </div>

                    <button type="submit" class="btn primary-btn"
                        style="padding: 15px; background: var(--primary-color); color: white; border: none; cursor: pointer; margin-top: 10px;">VERIFY
                        ACCOUNT</button>

                    <p style="margin-top: 15px; font-size: 0.9rem; color: var(--text-light);">
                        Didn't receive the code? <a href="#"
                            style="color: var(--primary-color); text-decoration: underline;">Resend</a>
                    </p>
                </form>
            </div>
        </section>
    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>
</body>

</html>

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head(title='Login')}"></head>

<body>
    <div th:replace="~{fragments/header :: header}"></div>
    <main>
        <section class="login-section" style="padding: 100px 0; text-align: center;">
            <div class="container" style="max-width: 400px; margin: 0 auto;">
                <h1 style="font-weight: 300; margin-bottom: 30px;">Welcome Back</h1>
                <form th:action="@{/login}" method="post" style="display: flex; flex-direction: column; gap: 20px;">
                    <input type="email" name="username" placeholder="Email" required
                        style="padding: 15px; border: 1px solid var(--border-color); width: 100%;" />

                    <div style="position: relative; width: 100%;">
                        <input type="password" name="password" id="password" placeholder="Password" required
                            style="padding: 15px; border: 1px solid var(--border-color); width: 100%;" />
                        <button type="button" onclick="togglePassword(this)"
                            style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--text-light); font-size: 0.9rem;">Show</button>
                    </div>
                    <button type="submit" class="btn primary-btn"
                        style="padding: 15px; background: var(--primary-color); color: white; border: none; cursor: pointer; margin-top: 10px;">SIGN
                        IN</button>

                    <div style="display: flex; align-items: center; margin: 15px 0;">
                        <hr style="flex: 1; border: none; border-top: 1px solid var(--border-color);" />
                        <span style="padding: 0 10px; color: var(--text-light); font-size: 0.85rem;">OR</span>
                        <hr style="flex: 1; border: none; border-top: 1px solid var(--border-color);" />
                    </div>

                    <a th:href="@{/oauth2/authorization/google}"
                        style="display: flex; align-items: center; justify-content: center; gap: 10px; padding: 12px; border: 1px solid var(--border-color); background: white; color: var(--text-dark); text-decoration: none; border-radius: 4px; font-weight: 500; transition: background 0.2s;">
                        <svg width="18" height="18" viewBox="0 0 24 24">
                            <path fill="#4285F4"
                                d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                            <path fill="#34A853"
                                d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                            <path fill="#FBBC05"
                                d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                            <path fill="#EA4335"
                                d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                        </svg>
                        Continue with Google
                    </a>
                    </a>

                    <p style="margin-top: 15px; font-size: 0.9rem; color: var(--text-light);">
                        Don't have an account? <a th:href="@{/register}"
                            style="color: var(--primary-color); text-decoration: underline;">Sign up here</a>
                    </p>
                </form>
            </div>
        </section>
    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>

    <script>
        function togglePassword(btn) {
            const passwordInput = document.getElementById('password');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                btn.textContent = 'Hide';
            } else {
                passwordInput.type = 'password';
                btn.textContent = 'Show';
            }
        }
    </script>
</body>

</html>

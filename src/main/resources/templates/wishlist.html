<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head(title='My Wishlist')}"></head>

<body>
    <div th:replace="~{fragments/header :: header}"></div>

    <main style="max-width: 1200px; margin: 4rem auto; padding: 0 2rem;">
        <h1
            style="font-size: 2.5rem; font-weight: 700; margin: 0 0 3rem 0; letter-spacing: -1px; text-align: center; color: var(--primary-color);">
            YOUR WISHLIST</h1>

        <div th:if="${successMessage}"
            style="background: rgba(16, 185, 129, 0.1); border: 1px solid #10b981; color: #10b981; padding: 1rem; border-radius: 0.5rem; margin-bottom: 2rem; text-align: center;"
            th:text="${successMessage}"></div>

        <div th:if="${#lists.isEmpty(wishlist.items)}" style="text-align: center; padding: 4rem 0;">
            <p style="color: var(--text-light); font-size: 1.25rem; margin-bottom: 2rem;">Your wishlist is currently
                empty.</p>
            <a th:href="@{/shop}"
                style="display: inline-block; background: var(--primary-color); color: white; padding: 1rem 2rem; border-radius: 0.375rem; text-decoration: none; font-weight: 600;">DISCOVER
                PRODUCTS</a>
        </div>

        <div th:unless="${#lists.isEmpty(wishlist.items)}"
            style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 2rem;">

            <div th:each="item : ${wishlist.items}" class="product-card"
                style="background: white; border-radius: 0.5rem; overflow: hidden; border: 1px solid var(--border-color); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); transition: transform 0.3s ease;">
                <a th:href="@{/product/{id}(id=${item.product.id})}"
                    style="text-decoration: none; color: inherit; display: block;">
                    <div style="position: relative; padding-top: 130%; background: var(--secondary-color);">
                        <img th:if="${item.product.mainImageUrl}" th:src="${item.product.mainImageUrl}"
                            style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover;">
                        <div th:unless="${item.product.mainImageUrl}"
                            style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; color: var(--text-light);">
                            No Image</div>
                    </div>

                    <div style="padding: 1.5rem;">
                        <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                            <div>
                                <h3 style="margin: 0 0 0.25rem 0; font-size: 1.1rem; font-weight: 600; color: var(--primary-color);"
                                    th:text="${item.product.title}">Title</h3>
                                <p style="color: var(--text-light); font-size: 0.85rem; margin: 0 0 1rem 0;"
                                    th:text="${item.product.category}">Category</p>
                            </div>
                            <form th:action="@{/wishlist/remove}" method="post" style="margin: 0;">
                                <input type="hidden" name="wishlistItemId" th:value="${item.id}">
                                <button type="submit" title="Remove"
                                    style="background: none; border: none; color: #ef4444; cursor: pointer; padding: 0.5rem;">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"
                                        stroke="currentColor" stroke-width="2">
                                        <path
                                            d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z">
                                        </path>
                                    </svg>
                                </button>
                            </form>
                        </div>
                        <div style="font-weight: 500; color: var(--primary-color);"
                            th:text="${'LKR ' + item.product.basePrice}">
                            LKR 0.00
                        </div>
                    </div>
                </a>
            </div>

        </div>
    </main>
    <div th:replace="~{fragments/footer :: footer}"></div>
</body>

</html>

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <title>My Products | QC Vendor</title>
    
    <link rel="stylesheet" th:href="@{/admin/layout.html}" />
    <style th:replace="~{admin/layout :: style}"></style>
</head>

<body
    style="margin: 0; font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #0f172a; display: flex; min-height: 100vh;">

    
    <aside th:replace="~{fragments/seller-sidebar :: sidebar(activePage='products')}"></aside>

    <main class="main-content"
        style="flex: 1; padding: 2rem 3rem; display: flex; flex-direction: column; overflow-y: auto;">

        <div class="header-top"
            style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid #e2e8f0;">
            <h1 style="font-size: 1.8rem; font-weight: 500; margin: 0;">My Catalog</h1>
            <a th:href="@{/seller/products/new}" class="btn"
                style="background-color: #3b82f6; color: white; border: none; padding: 0.5rem 1.2rem; border-radius: 0.375rem; cursor: pointer; text-decoration: none; font-size: 0.875rem;">+
                Post New Product</a>
        </div>

        <div th:if="${param.success}" class="alert alert-success"
            style="padding: 1rem; margin-bottom: 1.5rem; border-radius: 0.375rem; background: rgba(16, 185, 129, 0.1); color: #10b981; border: 1px solid #10b981;"
            th:text="${param.success}"></div>
        <div th:if="${param.error}" class="alert alert-danger"
            style="padding: 1rem; margin-bottom: 1.5rem; border-radius: 0.375rem; background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid #ef4444;"
            th:text="${param.error}"></div>

        <table
            style="width: 100%; border-collapse: collapse; background-color: #ffffff; border-radius: 0.5rem; overflow: hidden;">
            <thead>
                <tr>
                    <th
                        style="padding: 1rem; text-align: left; border-bottom: 1px solid #e2e8f0; font-weight: 600; color: #64748b; font-size: 0.875rem; text-transform: uppercase;">
                        Image</th>
                    <th
                        style="padding: 1rem; text-align: left; border-bottom: 1px solid #e2e8f0; font-weight: 600; color: #64748b; font-size: 0.875rem; text-transform: uppercase;">
                        Title</th>
                    <th
                        style="padding: 1rem; text-align: left; border-bottom: 1px solid #e2e8f0; font-weight: 600; color: #64748b; font-size: 0.875rem; text-transform: uppercase;">
                        Category</th>
                    <th
                        style="padding: 1rem; text-align: left; border-bottom: 1px solid #e2e8f0; font-weight: 600; color: #64748b; font-size: 0.875rem; text-transform: uppercase;">
                        Price</th>
                    <th
                        style="padding: 1rem; text-align: left; border-bottom: 1px solid #e2e8f0; font-weight: 600; color: #64748b; font-size: 0.875rem; text-transform: uppercase;">
                        Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="product : ${products}">
                    <td style="padding: 1rem; text-align: left; border-bottom: 1px solid #e2e8f0;">
                        <img th:if="${product.mainImageUrl}" th:src="${product.mainImageUrl}" alt="P"
                            style="width: 40px; height: 40px; object-fit: cover; border-radius: 4px; background: #e2e8f0;">
                        <div th:unless="${product.mainImageUrl}"
                            style="width: 40px; height: 40px; border-radius: 4px; background: #e2e8f0; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; color: #64748b;">
                            N/A</div>
                    </td>
                    <td style="padding: 1rem; text-align: left; border-bottom: 1px solid #e2e8f0; font-weight: 500;"
                        th:text="${product.title}">Cotton Tee</td>
                    <td style="padding: 1rem; text-align: left; border-bottom: 1px solid #e2e8f0; color: #64748b;"
                        th:text="${product.category}">T-Shirts</td>
                    <td style="padding: 1rem; text-align: left; border-bottom: 1px solid #e2e8f0; color: #10b981;"
                        th:text="${'LKR ' + product.basePrice}">LKR 45.00</td>
                    <td style="padding: 1rem; text-align: left; border-bottom: 1px solid #e2e8f0;">
                        <a th:href="@{/seller/products/{id}/edit(id=${product.id})}"
                            style="color: #60a5fa; text-decoration: none; margin-right: 15px; font-size: 0.9rem;">Edit</a>
                        <a th:href="@{/seller/products/{id}/delete(id=${product.id})}"
                            onclick="return confirm('Are you sure you want to delete this product?');"
                            style="color: #ef4444; text-decoration: none; font-size: 0.9rem;">Delete</a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(products)}">
                    <td colspan="5" style="padding: 2rem; text-align: center; color: #64748b;">You haven't posted any
                        products yet.</td>
                </tr>
            </tbody>
        </table>
    </main>
</body>

</html>

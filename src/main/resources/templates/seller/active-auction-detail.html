<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${auction.product.title + ' | QC.'}">Auction Detail | QC.</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,600;1,600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --seller-bg: #f8fafc;
            --seller-card: #ffffff;
            --seller-text: #0f172a;
        }

        body {
            background-color: var(--seller-bg);
            color: var(--seller-text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
        }

        .dashboard-container {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 260px;
            background: var(--seller-card);
            padding: 2rem 0;
            flex-shrink: 0;
            border-right: 1px solid rgba(0, 0, 0, 0.05);
        }

        .main-content {
            flex-grow: 1;
            padding: 2rem 3rem;
            overflow-y: auto;
        }

        .auction-detail-container {
            max-width: 1200px;
            margin: 4rem auto;
            padding: 0 2rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
        }

        .image-gallery img {
            width: 100%;
            height: auto;
            border-radius: 12px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }

        .auction-info h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            color: var(--seller-text);
            margin-bottom: 0.5rem;
            line-height: 1.2;
        }

        .seller-info {
            color: var(--text-light);
            margin-bottom: 2rem;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .price-box {
            background: #f1f5f9;
            border: 1px solid rgba(0, 0, 0, 0.05);
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 2rem;
        }

        .price-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 1.5rem;
        }

        .current-bid-label {
            font-size: 0.85rem;
            color: #10b981;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }

        .current-bid-amount {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--seller-text);
            line-height: 1;
        }

        .starting-price {
            font-size: 0.9rem;
            color: var(--text-light);
        }

        .bid-input-group {
            display: flex;
            gap: 1rem;
        }

        .bid-input {
            flex-grow: 1;
            padding: 1rem;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 1.1rem;
            font-family: inherit;
        }

        .bid-input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .btn-submit-bid {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 0 2rem;
            border-radius: 6px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn-submit-bid:hover {
            background: #2563eb;
        }

        .bid-history {
            margin-top: 3rem;
        }

        .bid-history h3 {
            font-size: 1.25rem;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.75rem;
        }

        .bid-item {
            display: flex;
            justify-content: space-between;
            padding: 1rem 0;
            border-bottom: 1px solid var(--border-color);
        }

        .bid-bidder {
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .bidder-icon {
            width: 24px;
            height: 24px;
            background: var(--border-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: bold;
        }

        .bid-time {
            font-size: 0.85rem;
            color: var(--text-light);
        }

        .bid-amount {
            font-weight: 600;
            color: #10b981;
        }

        .alert {
            padding: 1rem;
            border-radius: 6px;
            margin-bottom: 1.5rem;
        }

        .alert-success {
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .alert-danger {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .alert-warning {
            background: rgba(245, 158, 11, 0.1);
            color: #f59e0b;
            border: 1px solid rgba(245, 158, 11, 0.2);
            margin-top: 1rem;
            font-size: 0.85rem;
        }

        @media (max-width: 768px) {
            .auction-detail-container {
                grid-template-columns: 1fr;
                gap: 2rem;
                padding-top: 2rem;
            }
        }
    </style>
</head>

<body>
    <div class="dashboard-container">
        
        <aside th:replace="~{fragments/seller-sidebar :: sidebar(activePage='active-auctions')}"></aside>

        <main class="main-content">
            <div class="auction-detail-container">
                
                <div class="image-gallery">
                    <img th:src="${auction.product.mainImageUrl}" alt="Product Image">
                </div>

                
                <div class="auction-info">
                    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
                    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                    <h1 th:text="${auction.product.title}">Product Title</h1>
                    <div class="seller-info">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                        <span th:text="'Listed by ' + ${auction.seller.name}">Seller Name</span>
                    </div>
                    <div style="font-size: 0.85rem; color: #3b82f6; margin-bottom: 2rem; font-weight: 500;"
                        th:text="'Lot includes ' + ${auction.clothingPieces} + ' pieces'">Pieces count</div>

                    <div style="margin-bottom: 2rem; color: var(--text-light); line-height: 1.6;"
                        th:text="${auction.product.description}">
                        Product Description
                    </div>

                    <div class="price-box">
                        <div th:if="${auction.active}">
                            <div class="price-row">
                                <div>
                                    <div class="current-bid-label">Current Highest Bid</div>
                                    <div class="current-bid-amount"
                                        th:text="${'LKR ' + #numbers.formatDecimal(auction.currentHighestBid, 1, 'COMMA', 2, 'POINT')}">
                                        Price</div>
                                </div>
                                <div class="starting-price"
                                    th:text="'Started at LKR ' + ${#numbers.formatDecimal(auction.startingPrice, 1, 'COMMA', 2, 'POINT')}">
                                    Started At</div>
                            </div>

                            <form sec:authorize="hasRole('SELLER')"
                                th:action="@{/seller/auctions/active/{id}/bid(id=${auction.id})}" method="post">
                                
                                <div class="bid-input-group">
                                    <input type="number" step="0.01" th:min="${auction.currentHighestBid + 1}"
                                        name="amount" class="bid-input" placeholder="Enter your bid (LKR)" required>
                                    <button type="submit" class="btn-submit-bid">Place Bid</button>
                                </div>
                            </form>

                            <div th:if="${currentUser == null}" class="alert-warning" style="text-align: center;">
                                <a th:href="@{/login}" style="color: inherit; text-decoration: underline;">Wait, you
                                    need to log in to place bids.</a>
                            </div>
                        </div>

                        <div th:if="${!auction.active}" style="text-align: center;">
                            <div style="font-size: 1.5rem; font-weight: 700; color: #ef4444; margin-bottom: 1rem;">
                                AUCTION
                                CLOSED</div>
                            <div th:if="${auction.winner}" style="font-size: 1.1rem;">
                                Winning Bid: <span style="font-weight: 600; color: #10b981;"
                                    th:text="${'LKR ' + #numbers.formatDecimal(auction.currentHighestBid, 1, 'COMMA', 2, 'POINT')}">Price</span><br>
                                Winner: <span style="font-weight: 600;" th:text="${auction.winner.name}">Winner</span>
                            </div>
                            <div th:if="${auction.winner == null}" style="color: var(--text-light);">
                                Ended with no bids.
                            </div>
                        </div>
                    </div>

                    <div class="bid-history">
                        <h3>Bid History (<span th:text="${#lists.size(bids)}">0</span>)</h3>

                        <div th:if="${#lists.isEmpty(bids)}" style="color: var(--text-light); font-style: italic;">
                            No bids have been placed yet. Be the first!
                        </div>

                        <div th:each="bid, iterStat : ${bids}" class="bid-item">
                            <div>
                                <div class="bid-bidder">
                                    <div class="bidder-icon"
                                        th:text="${#strings.substring(bid.bidder.name, 0, 1).toUpperCase()}">U</div>
                                    <span th:text="${bid.bidder.name}">User</span>
                                    <span th:if="${iterStat.first && auction.active}"
                                        style="background: #10b981; color: #0f172a; padding: 2px 6px; border-radius: 4px; font-size: 0.6rem; font-weight: bold;">TOP
                                        BID</span>
                                </div>
                                <div class="bid-time" th:text="${#temporals.format(bid.bidTime, 'MMM dd, yyyy HH:mm')}">
                                    Time
                                </div>
                            </div>
                            <div class="bid-amount"
                                th:text="${'LKR ' + #numbers.formatDecimal(bid.amount, 1, 'COMMA', 2, 'POINT')}">Amount
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>

</html>

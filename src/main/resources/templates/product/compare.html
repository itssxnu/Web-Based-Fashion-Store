<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head(title='Compare Products')}"></head>

<body>
    <div th:replace="~{fragments/header :: header}"></div>

    <main style="padding: 100px 0;">
        <div class="container">
            <div
                style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 30px; border-bottom: 1px solid var(--border-color); padding-bottom: 20px;">
                <div>
                    <h1 style="font-size: 2rem; font-weight: 500; margin: 0 0 10px 0;">Compare Products</h1>
                    <p style="color: var(--text-light); margin: 0;">Side-by-side analysis of your selected items.</p>
                </div>

                <div style="display: flex; gap: 15px;">
                    <button class="btn" id="toggle-diff-btn"
                        style="padding: 10px 20px; border: 1px solid var(--border-color); background: white; border-radius: 4px; cursor: pointer; font-weight: 500;">
                        Show Only Differences
                    </button>
                    <a th:href="@{/shop}" class="btn primary-btn"
                        style="padding: 10px 20px; text-decoration: none; border-radius: 4px;">Back to Shop</a>
                </div>
            </div>

            <div
                style="overflow-x: auto; background: white; border: 1px solid var(--border-color); border-radius: 8px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);">
                <table id="comparison-table" style="width: 100%; border-collapse: collapse; text-align: left;">

                    
                    <thead>
                        <tr>
                            <th
                                style="width: 15%; padding: 20px; border-right: 1px solid var(--border-color); border-bottom: 2px solid var(--border-color); background: #f9fafb; font-weight: 600; color: var(--text-light);">
                                Features</th>

                            <th th:each="product : ${products}"
                                style="width: 21%; padding: 20px; border-right: 1px solid var(--border-color); border-bottom: 2px solid var(--border-color); vertical-align: top;">
                                <div style="position: relative;">
                                    <button onclick="removeProductFromCompare(this)" th:data-id="${product.id}"
                                        style="position: absolute; top: 0; right: 0; background: rgba(239, 68, 68, 0.1); color: #ef4444; border: none; width: 24px; height: 24px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; z-index: 10;">&times;</button>

                                    <div
                                        style="aspect-ratio: 1; background: var(--secondary-color); border-radius: 4px; overflow: hidden; margin-bottom: 15px;">
                                        <img th:if="${product.mainImageUrl}" th:src="${product.mainImageUrl}"
                                            style="width: 100%; height: 100%; object-fit: cover;">
                                        <div th:unless="${product.mainImageUrl}"
                                            style="width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; color: var(--text-light); text-transform: uppercase; font-size: 0.8rem;">
                                            [[${product.category}]]
                                        </div>
                                    </div>
                                    <a th:href="@{/product/{id}(id=${product.id})}"
                                        style="text-decoration: none; color: var(--primary-color);">
                                        <h3 style="font-size: 1.1rem; font-weight: 500; margin: 0 0 10px 0; line-height: 1.4;"
                                            th:text="${product.title}">Title</h3>
                                    </a>
                                </div>
                            </th>
                        </tr>
                    </thead>

                    <tbody>
                        
                        <tr class="compare-row" data-feature="price">
                            <td
                                style="padding: 15px 20px; border-right: 1px solid var(--border-color); border-bottom: 1px solid var(--border-color); font-weight: 500; color: var(--text-light); background: #f9fafb;">
                                Price</td>
                            <td th:each="product : ${products}"
                                style="padding: 15px 20px; border-right: 1px solid var(--border-color); border-bottom: 1px solid var(--border-color);">
                                <div style="display: flex; align-items: center; gap: 10px;">
                                    <span th:text="${'LKR ' + product.basePrice}"
                                        style="font-size: 1.1rem; font-weight: 500;"></span>
                                    
                                    <span th:if="${product.basePrice == lowestPrice}"
                                        style="background: rgba(16, 185, 129, 0.1); color: #10b981; padding: 2px 8px; border-radius: 12px; font-size: 0.75rem; font-weight: 600;">BEST
                                        VALUE</span>
                                </div>
                            </td>
                        </tr>

                        
                        <tr class="compare-row" data-feature="category">
                            <td
                                style="padding: 15px 20px; border-right: 1px solid var(--border-color); border-bottom: 1px solid var(--border-color); font-weight: 500; color: var(--text-light); background: #f9fafb;">
                                Category</td>
                            <td th:each="product : ${products}" class="feature-cell"
                                style="padding: 15px 20px; border-right: 1px solid var(--border-color); border-bottom: 1px solid var(--border-color);">
                                <span th:text="${product.category}"
                                    style="display: inline-block; background: var(--secondary-color); padding: 4px 10px; border-radius: 4px; font-size: 0.9rem;"></span>
                            </td>
                        </tr>

                        
                        <tr class="compare-row" data-feature="seller">
                            <td
                                style="padding: 15px 20px; border-right: 1px solid var(--border-color); border-bottom: 1px solid var(--border-color); font-weight: 500; color: var(--text-light); background: #f9fafb;">
                                Seller</td>
                            <td th:each="product : ${products}" class="feature-cell"
                                style="padding: 15px 20px; border-right: 1px solid var(--border-color); border-bottom: 1px solid var(--border-color);">
                                <span th:text="${product.seller != null ? product.seller.name : 'QC Originals'}"
                                    style="font-weight: 500;"></span>
                            </td>
                        </tr>

                        
                        <tr class="compare-row" data-feature="variants">
                            <td
                                style="padding: 15px 20px; border-right: 1px solid var(--border-color); border-bottom: 1px solid var(--border-color); font-weight: 500; color: var(--text-light); background: #f9fafb;">
                                Colors / Variants</td>
                            <td th:each="product : ${products}" class="feature-cell"
                                style="padding: 15px 20px; border-right: 1px solid var(--border-color); border-bottom: 1px solid var(--border-color);">
                                
                                <div style="display: flex; gap: 5px; flex-wrap: wrap;"
                                    th:with="colorList=${product.variants.![color]}">
                                    
                                    <span th:each="variant : ${product.variants}"
                                        style="font-size: 0.85rem; padding: 2px 8px; border: 1px solid var(--border-color); border-radius: 12px; background: white;"
                                        th:text="${variant.color + ' (' + variant.size + ')'}"></span>
                                </div>
                                <div th:if="${#lists.isEmpty(product.variants)}"
                                    style="color: var(--text-light); font-size: 0.85rem;">One Size / Out of Stock</div>
                            </td>
                        </tr>

                        
                        <tr>
                            <td
                                style="padding: 20px; border-right: 1px solid var(--border-color); background: #f9fafb;">
                            </td>
                            <td th:each="product : ${products}"
                                style="padding: 20px; border-right: 1px solid var(--border-color); text-align: center;">
                                <a th:href="@{/product/{id}(id=${product.id})}" class="btn primary-btn"
                                    style="display: inline-block; width: 100%; border-radius: 4px; padding: 12px 0; text-decoration: none;">View
                                    Item</a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>

    <script>
        // Highlighting Logic (Difference Emphasize)
        document.addEventListener('DOMContentLoaded', () => {
            const rows = document.querySelectorAll('.compare-row');

            rows.forEach(row => {
                const cells = Array.from(row.querySelectorAll('.feature-cell'));
                if (cells.length < 2) return;

                // Extract text content of all cells in this row to see if they are identical
                const values = cells.map(cell => cell.textContent.trim().toLowerCase());

                // Set logic trick: if Set size > 1, meaning not all items are identical
                const uniqueValues = new Set(values);

                if (uniqueValues.size > 1) {
                    // Difference Emphasize: highlight rows where things differ
                    row.setAttribute('data-identical', 'false');

                    // Optional visual cue: slight background tint to the cells
                    cells.forEach(cell => {
                        cell.style.background = 'rgba(239, 68, 68, 0.03)'; // subtle red difference tint
                        cell.style.borderLeft = '2px solid rgba(239, 68, 68, 0.3)';
                    });
                } else {
                    row.setAttribute('data-identical', 'true');
                }
            });

            // "Show Only Differences" Toggle Logic
            const toggleBtn = document.getElementById('toggle-diff-btn');
            let showingOnlyDiffs = false;

            toggleBtn.addEventListener('click', () => {
                showingOnlyDiffs = !showingOnlyDiffs;
                toggleBtn.innerText = showingOnlyDiffs ? "Show All Features" : "Show Only Differences";
                toggleBtn.style.background = showingOnlyDiffs ? "var(--primary-color)" : "white";
                toggleBtn.style.color = showingOnlyDiffs ? "white" : "var(--primary-color)";

                rows.forEach(row => {
                    const isIdentical = row.getAttribute('data-identical') === 'true';
                    // Never hide the Price row unconditionally, it's the most important
                    if (row.getAttribute('data-feature') === 'price') return;

                    if (showingOnlyDiffs && isIdentical) {
                        row.style.display = 'none';
                    } else {
                        row.style.display = '';
                    }
                });
            });
        });

        // Function allowing a user to drop a product directly off the comparison table
        function removeProductFromCompare(btnElement) {
            const idToRemove = parseInt(btnElement.getAttribute('data-id'), 10);

            // 1. Remove from generic LocalStorage memory
            try {
                const raw = localStorage.getItem('store_compare_ids');
                if (raw) {
                    let ids = JSON.parse(raw);
                    ids = ids.filter(id => id !== idToRemove);
                    localStorage.setItem('store_compare_ids', JSON.stringify(ids));

                    // 2. Reload page via GET parameter string
                    if (ids.length > 1) {
                        window.location.href = `/compare?ids=${ids.join(',')}`;
                    } else {
                        window.location.href = `/shop`; // Not enough items left to compare
                    }
                }
            } catch (e) { console.error(e); }
        }
    </script>
</body>

</html>
